<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>co-cure 免疫层析分析系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00c2a0; 
            --primary-light: rgba(0, 194, 160, 0.15);
            --secondary: #1b212d; 
            --bg-color: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.7); 
            --text-main: #1c2433;
            --text-sub: #94a3b8;
            --danger: #ff4d6d;
            --danger-light: rgba(255, 77, 109, 0.1);
            --shadow-sm: 0 8px 32px rgba(31, 38, 135, 0.05);
            --radius-lg: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'PingFang SC', 'SF Pro Display', -apple-system, sans-serif; }
        
        body { background-color: #d1d5db; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }

        /* 模拟手机容器 */
        .device {
            width: 375px; height: 812px;
            background-color: var(--bg-color);
            border-radius: 44px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            position: relative; overflow: hidden;
            border: 8px solid #ffffff;
        }

        /* 背景装饰 */
        .bg-decor { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .bg-line { position: absolute; stroke: var(--primary); fill: none; stroke-width: 1.5; opacity: 0.1; }

        /* 屏幕控制 */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent; display: flex; flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%); opacity: 0; z-index: 1;
        }
        .screen.active { transform: translateX(0); opacity: 1; z-index: 10; }

        /* 导航栏 - 图标放大并统一绿色 */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 60px 24px 20px; position: relative; z-index: 20; }
        
        .logo-box {
            width: 52px; height: 52px; background: var(--primary); border-radius: 14px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0, 194, 160, 0.4);
            font-size: 30px; color: white;
        }

        .icon-btn { 
            width: 52px; height: 52px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px);
            border-radius: 16px; display: flex; justify-content: center; align-items: center; box-shadow: var(--shadow-sm); 
            cursor: pointer; color: var(--primary); font-size: 24px;
        }

        .center-head-icon { font-size: 32px; color: var(--primary) !important; }

        .content { flex: 1; padding: 0 24px; overflow-y: auto; padding-bottom: 100px; position: relative; z-index: 20; }
        
        .card { 
            background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius-lg); padding: 24px; margin-bottom: 16px; 
            box-shadow: var(--shadow-sm); border: 1px solid rgba(255, 255, 255, 0.4); 
        }

        /* 地图样式 */
        .map-square {
            width: 100%; aspect-ratio: 1 / 1; border-radius: 32px; position: relative;
            overflow: hidden; background: #eee; border: 1px solid rgba(0,0,0,0.05); box-shadow: var(--shadow-sm);
        }
        .map-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        @keyframes pulse-risk {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(255, 77, 109, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); }
        }
        .risk-dot {
            position: absolute; width: 16px; height: 16px; background: var(--danger);
            border-radius: 50%; border: 2px solid white; animation: pulse-risk 2s infinite;
        }
        
        /* 首页趋势图 */
        .trend-chart { display: flex; align-items: flex-end; justify-content: space-between; height: 50px; margin: 15px 10% 0; }
        .bar { width: 10%; background: var(--primary-light); border-radius: 3px; }
        .bar.active { background: var(--primary); }

        .big-val { font-size: 80px; font-weight: 800; color: var(--text-main); letter-spacing: -2px; line-height: 1; text-align: center; margin: 10px 0;}
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 10px; }
        .action-item { background: white; border-radius: var(--radius-lg); padding: 30px 16px; text-align: center; cursor: pointer; box-shadow: var(--shadow-sm); }

        .progress-container { position: relative; width: 220px; height: 220px; margin: 30px auto; }
        .progress-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .track { fill: none; stroke: rgba(255,255,255,0.5); stroke-width: 12; stroke-linecap: round; }
        .progress-bar { fill: none; stroke: var(--primary); stroke-width: 12; stroke-linecap: round; stroke-dasharray: 565; stroke-dashoffset: 565; transition: 0.3s; }
        .inner-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        .bottom-action { position: absolute; bottom: 30px; left: 24px; right: 24px; z-index: 100; }
        .btn-main { background: var(--secondary); color: white; border: none; width: 100%; padding: 20px; border-radius: 20px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }

        .result-icon-box { 
            width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 20px;
            display: flex; justify-content: center; align-items: center; font-size: 60px;
        }

        .conf-gauge { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 20px; position: relative; }
        .conf-fill { position: absolute; height: 100%; background: var(--primary); border-radius: 3px; }

        @keyframes scanMove { 0% { top: 0; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .scan-window { position: relative; overflow: hidden; }
        .laser { position: absolute; left: 0; top: 0; width: 100%; height: 2px; background: var(--primary); box-shadow: 0 0 15px var(--primary); z-index: 5; animation: scanMove 2.5s infinite linear; }
    </style>
</head>
<body>

<div class="device">
    <div class="bg-decor">
        <svg width="100%" height="100%" viewBox="0 0 375 812">
            <path class="bg-line" d="M-50 200 Q 150 150 400 250" /><circle cx="320" cy="150" r="100" class="bg-line" style="opacity: 0.05;" />
        </svg>
    </div>

    <!-- 1. 首页 -->
    <div class="screen active" id="layer-home">
        <div class="nav-bar">
            <div class="logo-box"><i class="fas fa-plus"></i></div>
            <div style="display:flex; gap:12px;">
                <div class="icon-btn" onclick="navTo('layer-map')"><i class="fas fa-map-marked-alt"></i></div>
                <div class="icon-btn" onclick="navTo('layer-data')"><i class="fas fa-history"></i></div>
            </div>
        </div>
        <div class="content">
            <div style="text-align: center; margin-bottom: 10px;">
                <p style="color:var(--text-sub); font-size:14px; font-weight:700;">今日已检份数</p>
                <div class="big-val">12</div>
                <div class="trend-chart">
                    <div class="bar" style="height: 30%;"></div><div class="bar" style="height: 50%;"></div><div class="bar" style="height: 40%;"></div><div class="bar active" style="height: 80%;"></div><div class="bar" style="height: 60%;"></div><div class="bar" style="height: 20%;"></div>
                </div>
            </div>

            <div class="card" style="display:flex; justify-content: space-around; background: var(--secondary); color:white; padding:18px 10px;">
                <div style="text-align:center;"><i class="fas fa-map-marker-alt" style="color:var(--primary); font-size: 18px; margin-bottom:6px;"></i><p style="font-size:10px; opacity:0.6;">海拔</p><p style="font-size:11px; font-weight:700;">3214m</p></div>
                <div style="text-align:center;"><i class="fas fa-thermometer-half" style="color:var(--primary); font-size: 18px; margin-bottom:6px;"></i><p style="font-size:10px; opacity:0.6;">环境温度</p><p style="font-size:11px; font-weight:700;">20.2°C</p></div>
                <div style="text-align:center;"><i class="fas fa-tint" style="color:var(--primary); font-size: 18px; margin-bottom:6px;"></i><p style="font-size:10px; opacity:0.6;">环境湿度</p><p style="font-size:11px; font-weight:700;">24%</p></div>
            </div>

            <div class="action-grid">
                <div class="action-item" onclick="startTestFlow('human')">
                    <i class="fas fa-user-md" style="font-size:40px; color:var(--primary);"></i>
                    <p style="font-size:14px; font-weight:700; color:var(--text-main); margin-top:12px;">人员快筛</p>
                </div>
                <div class="action-item" onclick="startTestFlow('animal')">
                    <i class="fas fa-paw" style="font-size:40px; color:var(--primary);"></i>
                    <p style="font-size:14px; font-weight:700; color:var(--text-main); margin-top:12px;">牲畜抽检</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 疫情地图层 -->
    <div class="screen" id="layer-map">
        <div class="nav-bar">
            <div class="icon-btn" onclick="navTo('layer-home')"><i class="fas fa-chevron-left"></i></div>
            <i class="fas fa-map-marked-alt center-head-icon"></i>
            <div style="width:52px"></div>
        </div>
        <div class="content">
            <div class="map-square">
                <img src="map.jpg" class="map-img" alt="Map" onerror="this.src='https://via.placeholder.com/400x400?text=Wait+for+map.jpg'">
                <div class="risk-dot" style="top: 30%; left: 45%;"></div>
                <div class="risk-dot" style="top: 60%; left: 70%;"></div>
                <div class="risk-dot" style="top: 70%; left: 25%;"></div>
            </div>
            <div style="margin-top:24px; text-align:center;">
                <p style="font-weight:700; color:var(--text-main); font-size:18px;">高风险防疫区域</p>
                <p style="color:var(--text-sub); font-size:12px; margin-top:8px;">● 实时红点标识高危监控点</p>
            </div>
        </div>
    </div>

    <!-- 分析中页面 -->
    <div class="screen" id="layer-process">
        <div class="nav-bar">
            <div class="icon-btn" onclick="navTo('layer-home')"><i class="fas fa-times"></i></div>
            <i class="fas fa-microscope center-head-icon"></i>
            <div style="width:52px"></div>
        </div>
        <div class="content">
            <div class="progress-container">
                <svg class="progress-svg"><circle class="track" cx="110" cy="110" r="90"></circle><circle class="progress-bar" id="ring" cx="110" cy="110" r="90"></circle></svg>
                <div class="inner-content">
                    <div id="temp-display" style="font-size:32px; font-weight:800; color:var(--text-main)">20.0°C</div>
                    <p id="timer-display" style="color:var(--text-sub); font-weight:700; margin-top:5px;">请刷入样本</p>
                </div>
            </div>
            <div class="card" style="text-align:center; border:none; background:transparent;">
                <i class="fas fa-circle-notch fa-spin" style="color:var(--primary); font-size:28px;"></i>
                <p style="color:var(--text-sub); font-size:14px; margin-top:10px;">读取硬件数据中...</p>
            </div>
        </div>
    </div>

    <!-- 阴性结果 -->
    <div class="screen" id="layer-result-negative">
        <div class="nav-bar">
            <div class="icon-btn" onclick="navTo('layer-home')"><i class="fas fa-chevron-left"></i></div>
            <i class="fas fa-shield-alt center-head-icon"></i>
            <div class="icon-btn"><i class="fas fa-share-alt"></i></div>
        </div>
        <div class="content">
            <div class="card" style="text-align:center; padding: 40px 20px; border-bottom: 6px solid var(--primary);">
                <div class="result-icon-box" style="background: var(--primary-light); color: var(--primary);"><i class="fas fa-minus"></i></div>
                <p style="font-size:24px; font-weight:800; color:var(--primary); margin-bottom:10px;">检测结论：阴性 (-)</p>
                <div class="conf-gauge"><div class="conf-fill" style="width:99%;"></div></div>
                <p style="font-size:11px; color:var(--text-sub); margin-top:8px; font-weight:600;">系统置信度 99.85%</p>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="card" style="padding:15px; text-align:center;"><p style="font-size:11px; color:var(--text-sub); margin-bottom:8px;">质控C线</p><i class="fas fa-check-double" style="color:#16a34a; font-size:20px;"></i><p style="font-size:12px; font-weight:700; margin-top:5px; color:#16a34a;">有效</p></div>
                <div class="card" style="padding:15px; text-align:center;"><p style="font-size:11px; color:var(--text-sub); margin-bottom:8px;">检测T线</p><i class="fas fa-vial" style="color:var(--text-sub); font-size:20px;"></i><p style="font-size:13px; font-weight:800; margin-top:5px;">0.012</p></div>
            </div>
        </div>
        <div class="bottom-action"><button class="btn-main" onclick="navTo('layer-home')">同步平台数据</button></div>
    </div>

    <!-- 阳性结果 -->
    <div class="screen" id="layer-result-positive">
        <div class="nav-bar">
            <div class="icon-btn" onclick="navTo('layer-home')"><i class="fas fa-chevron-left"></i></div>
            <i class="fas fa-biohazard center-head-icon"></i>
            <div class="icon-btn"><i class="fas fa-share-alt"></i></div>
        </div>
        <div class="content">
            <div class="card" style="text-align:center; padding: 40px 20px; border-bottom: 6px solid var(--danger);">
                <div class="result-icon-box" style="background: var(--danger-light); color: var(--danger);"><i class="fas fa-plus"></i></div>
                <p style="font-size:24px; font-weight:800; color:var(--danger); margin-bottom:10px;">检测结论：阳性 (+)</p>
                <div class="conf-gauge"><div class="conf-fill" style="width:98%; background:var(--danger);"></div></div>
                <p style="font-size:11px; color:var(--text-sub); margin-top:8px; font-weight:600;">系统置信度 98.12%</p>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="card" style="padding:15px; text-align:center;"><p style="font-size:11px; color:var(--text-sub); margin-bottom:8px;">质控C线</p><i class="fas fa-check-double" style="color:#16a34a; font-size:20px;"></i><p style="font-size:12px; font-weight:700; margin-top:5px; color:#16a34a;">有效</p></div>
                <div class="card" style="padding:15px; text-align:center;"><p style="font-size:11px; color:var(--text-sub); margin-bottom:8px;">检测T线</p><i class="fas fa-vial" style="color:var(--danger); font-size:20px;"></i><p style="font-size:13px; font-weight:800; margin-top:5px; color:var(--danger);">3.850</p></div>
            </div>
        </div>
        <div class="bottom-action"><button class="btn-main" style="background:var(--danger)" onclick="navTo('layer-home')">发送预警信息</button></div>
    </div>

    <!-- 扫描页 -->
    <div class="screen" id="layer-scan">
        <div class="nav-bar">
            <div class="icon-btn" onclick="navTo('layer-home')"><i class="fas fa-chevron-left"></i></div>
            <i class="fas fa-qrcode center-head-icon" id="scan-head-icon"></i>
            <div style="width:52px"></div>
        </div>
        <div class="content">
            <div class="card scan-window" style="height:350px; display:flex; justify-content:center; align-items:center; border: 2px dashed var(--text-sub); background:rgba(255,255,255,0.3);">
                <div class="laser"></div>
                <div id="scan-icon-main" style="font-size:80px; color:var(--text-sub); opacity:0.3;"></div>
            </div>
            <p style="text-align:center; color:var(--text-sub); font-size:15px; font-weight:600; margin-top:20px;">请对准识别区域扫描身份信息</p>
        </div>
        <!-- 核心修改：将原来的 navTo() 替换为 startHardwareDetection() -->
        <div class="bottom-action"><button class="btn-main" onclick="startHardwareDetection()">开始样本分析</button></div>
    </div>

    <!-- 历史 -->
    <div class="screen" id="layer-data">
        <div class="nav-bar">
            <div class="icon-btn" onclick="navTo('layer-home')"><i class="fas fa-chevron-left"></i></div>
            <i class="fas fa-list-ul center-head-icon"></i>
            <div style="width:52px"></div>
        </div>
        <div class="content">
            <div class="card" style="padding: 10px 20px;">
                <div style="display:flex; align-items:center; padding:18px 0; border-bottom:1px solid #eee;">
                    <i class="fas fa-user-circle" style="font-size:36px; margin-right:12px; color:var(--text-sub);"></i>
                    <div style="flex:1"><p style="font-weight:700; font-size:15px;">张建国</p><p style="font-size:12px; color:var(--text-sub);">今天 14:30</p></div><i class="fas fa-minus-circle" style="color:var(--primary); font-size:22px;"></i>
                </div>
                <div style="display:flex; align-items:center; padding:18px 0;">
                    <i class="fas fa-paw" style="font-size:30px; margin-right:12px; color:var(--text-sub);"></i>
                    <div style="flex:1"><p style="font-weight:700; font-size:15px;">羊标 #0042</p><p style="font-size:12px; color:var(--text-sub);">今天 10:15</p></div><i class="fas fa-plus-circle" style="color:var(--danger); font-size:22px;"></i>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let timer;
    let currentFlow = 'human';

    // 页面路由函数
    function navTo(targetId) {
        if(timer) clearInterval(timer);
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(targetId).classList.add('active');
    }

    // 设置人员/动物入口状态
    function startTestFlow(type) {
        currentFlow = type;
        const scanIcon = document.getElementById('scan-icon-main');
        const headIcon = document.getElementById('scan-head-icon');
        if(type === 'human') {
            scanIcon.className = "fas fa-id-card";
            headIcon.className = "fas fa-user-check center-head-icon";
        } else {
            scanIcon.className = "fas fa-tag";
            headIcon.className = "fas fa-paw center-head-icon";
        }
        navTo('layer-scan');
    }

    // [新增] 硬件等待动画：无限转圈，直到红外感应器触发
    function startHardwareWaitingAnimation() {
        const ring = document.getElementById('ring');
        const tempText = document.getElementById('temp-display');
        const timerText = document.getElementById('timer-display');
        const totalDash = 565;
        let timePassed = 0;
        
        ring.style.strokeDashoffset = totalDash;
        
        timer = setInterval(() => {
            timePassed++;
            let currentTemp = (20 + Math.random() * 0.5).toFixed(1);
            tempText.innerText = `${currentTemp}°C`;
            timerText.innerText = `监测中 ${timePassed}s`;
            
            let offset = totalDash - (totalDash * ((timePassed % 15) / 15));
            ring.style.strokeDashoffset = offset;
        }, 1000);
    }

    // [核心] 与 Arduino 硬件的 USB Web Serial 通信
    async function startHardwareDetection() {
        try {
            // 1. 弹出系统浏览器授权框，请求连接你的 Arduino 板
            const port = await navigator.serial.requestPort();
            await port.open({ baudRate: 9600 });
            
            // 2. 连接成功后，跳转到“分析中”页面并播放UI动画
            navTo('layer-process');
            startHardwareWaitingAnimation();

            // 3. 开启数据流读取管道
            const textDecoder = new TextDecoderStream();
            const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
            const reader = textDecoder.readable.getReader();
            
            let dataBuffer = "";

            // 4. 死循环：时刻监听板子发过来的数据
            while (true) {
                const { value, done } = await reader.read();
                if (done) {
                    reader.releaseLock();
                    break;
                }
                if (value) {
                    dataBuffer += value;
                    console.log("硬件传来数据:", value);
                    
                    // 解析到阴性信号
                    if (dataBuffer.includes("NEGATIVE")) {
                        clearInterval(timer);
                        navTo('layer-result-negative');
                        await reader.cancel(); // 停止读取数据通道
                        break;
                    } 
                    // 解析到阳性信号
                    else if (dataBuffer.includes("POSITIVE")) {
                        clearInterval(timer);
                        navTo('layer-result-positive');
                        await reader.cancel(); // 停止读取数据通道
                        break;
                    }
                }
            }
        } catch (error) {
            // [降级保护] 如果用户取消授权，或者设备不支持串口（比如苹果手机），走原来的模拟动画逻辑
            console.warn("未连接物理设备，启用模拟演示模式", error);
            alert("未检测到外接硬件！\n系统将进入【15秒模拟演示模式】。");
            navTo('layer-process');
            startSimulationFallback(); 
        }
    }

    // [保护机制] 15秒纯软件模拟倒计时（保留你最开始的设计逻辑）
    function startSimulationFallback() {
        const ring = document.getElementById('ring');
        const tempText = document.getElementById('temp-display');
        const timerText = document.getElementById('timer-display');
        let timeLeft = 15;
        const totalDash = 565;
        ring.style.strokeDashoffset = totalDash;
        
        timer = setInterval(() => {
            timeLeft--;
            let currentTemp = (20 + Math.random() * 0.5).toFixed(1);
            tempText.innerText = `${currentTemp}°C`;
            timerText.innerText = `${timeLeft}秒`;
            let offset = totalDash - (totalDash * ((15 - timeLeft) / 15));
            ring.style.strokeDashoffset = offset;
            
            if(timeLeft <= 0) {
                clearInterval(timer);
                // 模拟结果判定
                const resPage = (currentFlow === 'human') ? 'layer-result-negative' : 'layer-result-positive';
                setTimeout(() => navTo(resPage), 600);
            }
        }, 1000);
    }
</script>

</body>
</html>
